<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生おみくじ</title>
    <style>
        :root {
            --bg-color: #f9f9f9;
            --main-blue: #a8d8ea;
            --accent-orange: #ffccbc;
            --text-color: #4a4a4a;
            --card-bg: #ffffff;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --border-radius: 16px;
            --star-color: #ffcc00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            color: var(--main-blue);
            font-size: 1.8rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            background-color: #eee;
            margin-top: 8px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-connect {
            background-color: var(--main-blue);
            color: white;
        }

        .btn-shake {
            background-color: var(--accent-orange);
            color: white;
        }

        .btn-reset {
            background-color: #e0e0e0;
            color: var(--text-color);
        }

        .shake-counter {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-orange);
            margin-top: 5px;
        }

        /* 3Dおみくじ箱のエリア */
        .omikuji-box-area {
            perspective: 1000px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            margin: 10px 0;
        }

        /* 箱の回転（上下）を制御するラッパー */
        .hex-box-wrapper {
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotateX(-10deg) rotateY(20deg) rotateZ(0deg);
        }

        /* 逆さま状態（画面内で180度回転） */
        .hex-box-wrapper.inverted {
            transform: rotateX(-10deg) rotateY(20deg) rotateZ(180deg);
        }

        .hex-box {
            position: relative;
            width: 80px;
            height: 200px;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            width: 80px;
            height: 200px;
            background: linear-gradient(to right, #fdf5e6, #f5deb3, #fdf5e6);
            border: 1px solid #d2b48c;
            display: flex;
            justify-content: center;
            align-items: center;
            backface-visibility: visible;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.08);
        }

        /* 各面の設定（60度ずつ回転） */
        .face:nth-child(1) { transform: rotateY(0deg) translateZ(68px); }
        .face:nth-child(2) { transform: rotateY(60deg) translateZ(68px); }
        .face:nth-child(3) { transform: rotateY(120deg) translateZ(68px); }
        .face:nth-child(4) { transform: rotateY(180deg) translateZ(68px); }
        .face:nth-child(5) { transform: rotateY(240deg) translateZ(68px); }
        .face:nth-child(6) { transform: rotateY(300deg) translateZ(68px); }

        .face::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 4px,
                rgba(0,0,0,0.03) 4px,
                rgba(0,0,0,0.03) 8px
            );
            pointer-events: none;
        }

        .face.front::after {
            content: "学生みくじ";
            writing-mode: vertical-rl;
            color: #8b7d6b;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 6px;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
        }

        .cap {
            position: absolute;
            width: 136px;
            height: 136px;
            background: #fff9e6;
            left: -28px;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            border: 1px solid #f0e68c;
        }
        .cap.top { top: -20px; transform: rotateX(90deg) translateZ(20px); }

        /* アニメーション */
        .shaking .hex-box {
            animation: shake3d 0.5s infinite linear;
        }

        @keyframes shake3d {
            0% { transform: rotateX(0deg); }
            25% { transform: rotateX(10deg) rotateY(10deg) translateZ(10px) rotateZ(5deg); }
            50% { transform: rotateX(-20deg) rotateY(-10deg) translateZ(-5px) rotateZ(-5deg); }
            75% { transform: rotateX(15deg) rotateY(5deg) translateZ(15px) rotateZ(3deg); }
            100% { transform: rotateX(0deg); }
        }

        .fortune-results-list {
            display: none;
            text-align: left;
            margin-top: 20px;
            gap: 10px;
            flex-direction: column;
        }

        .fortune-item {
            background: #fffafa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #f0f0f0;
        }

        .fortune-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .fortune-name {
            font-weight: bold;
            color: var(--text-color);
        }

        .stars {
            color: var(--star-color);
            letter-spacing: 2px;
        }

        .fortune-message {
            font-size: 0.85rem;
            color: #666;
        }

        .strong-luck-card {
            display: none;
            background-color: #fff9f0;
            border: 2px solid var(--accent-orange);
            padding: 15px;
            border-radius: var(--border-radius);
            text-align: center;
            margin-top: 10px;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .strong-luck-label {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--accent-orange);
            display: block;
            margin-bottom: 5px;
        }

        .strong-luck-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--text-color);
        }

        .history-area {
            text-align: left;
        }

        .history-title {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .history-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            padding: 8px 0;
            border-bottom: 1px dashed #ddd;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .card { padding: 15px; }
            .hex-box { width: 60px; height: 160px; }
            .face { width: 60px; height: 160px; }
            .face:nth-child(1) { transform: rotateY(0deg) translateZ(51px); }
            .face:nth-child(2) { transform: rotateY(60deg) translateZ(51px); }
            .face:nth-child(3) { transform: rotateY(120deg) translateZ(51px); }
            .face:nth-child(4) { transform: rotateY(180deg) translateZ(51px); }
            .face:nth-child(5) { transform: rotateY(240deg) translateZ(51px); }
            .face:nth-child(6) { transform: rotateY(300deg) translateZ(51px); }
            .cap { width: 102px; height: 102px; left: -21px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>学生おみくじ</h1>
            <div id="connectionStatus" class="status-badge">micro:bit未接続</div>
        </header>

        <section class="card controls">
            <button id="connectBtn" class="btn-connect">micro:bitを接続</button>
            <button id="shakeBtn" class="btn-shake">1回振る（テスト用）</button>
            <button id="resetBtn" class="btn-reset">履歴をリセット</button>
            <div id="shakeInstruction" class="shake-counter">
                micro:bitを3回振ってね（あと3回）
            </div>
        </section>

        <section class="card">
            <div id="omikujiBox" class="omikuji-box-area">
                <div id="omikujiWrapper" class="hex-box-wrapper">
                    <div class="hex-box">
                        <div class="face front"></div>
                        <div class="face"></div>
                        <div class="face"></div>
                        <div class="face"></div>
                        <div class="face"></div>
                        <div class="face"></div>
                        <div class="cap top"></div>
                    </div>
                </div>
            </div>
            
            <div id="strongLuckCard" class="strong-luck-card">
                <span class="strong-luck-label">✨ 今日の強運 ✨</span>
                <div id="strongLuckTitle" class="strong-luck-title">---</div>
            </div>

            <div id="fortuneResultsList" class="fortune-results-list"></div>
        </section>

        <section class="card history-area">
            <span class="history-title">強運ログ（履歴）</span>
            <ul id="historyList" class="history-list">
                <li class="history-item"><span>履歴はまだありません</span></li>
            </ul>
        </section>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const shakeBtn = document.getElementById('shakeBtn');
        const resetBtn = document.getElementById('resetBtn');
        const shakeInstruction = document.getElementById('shakeInstruction');
        const omikujiBox = document.getElementById('omikujiBox');
        const omikujiWrapper = document.getElementById('omikujiWrapper');
        const fortuneResultsList = document.getElementById('fortuneResultsList');
        const strongLuckCard = document.getElementById('strongLuckCard');
        const strongLuckTitle = document.getElementById('strongLuckTitle');
        const historyList = document.getElementById('historyList');
        const connectionStatus = document.getElementById('connectionStatus');

        let shakeCount = 0;
        const requiredShakes = 3;
        const STORAGE_KEY = 'omikuji_history';
        let port;
        let reader;

        window.addEventListener('DOMContentLoaded', renderHistory);

        const fortuneCategories = [
            { name: '課題運', messages: ['すぐに終わるよ！', '難問に挑戦してみよう', '提出忘れに注意！', '集中力が続く日', 'スラスラ解ける'] },
            { name: '出席運', messages: ['皆勤賞ペース！', '友達と楽しく話せる', '遅刻に注意しよう', '良い席になれるかも', '先生に褒められるかも'] },
            { name: '金運', messages: ['無駄遣いなし！', 'お小遣いゲットの予感', '計画的に使おう', '欲しかったものが買える？', '落とし物に注意'] },
            { name: '睡眠運', messages: ['快眠！目覚めスッキリ', '二度寝が最高に気持ちいい', '面白い夢が見られそう', '早めに寝るのが吉', '夢の中で勉強しちゃう？'] },
            { name: '昼食運', messages: ['大好物が出るよ！', '新メニューに挑戦しよう', '完食して元気いっぱい', '友達とお弁当交換？', 'デザートがあるかも'] }
        ];

        connectBtn.addEventListener('click', async () => {
            if (!("serial" in navigator)) {
                alert("お使いのブラウザは Web Serial API をサポートしていません。");
                return;
            }
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                connectionStatus.textContent = 'micro:bit 接続済み';
                connectionStatus.style.backgroundColor = '#d4edda';
                readLoop();
            } catch (error) {
                console.error(error);
            }
        });

        async function readLoop() {
            const textDecoder = new TextDecoderStream();
            const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();
            let buffer = '';
            try {
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += value;
                    let lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (let line of lines) {
                        line = line.trim();
                        if (line.includes('S') || line.includes('s')) simulateShake();
                    }
                }
            } catch (error) {
                console.error(error);
            } finally {
                reader.releaseLock();
            }
        }

        shakeBtn.addEventListener('click', () => {
            if (shakeCount < requiredShakes) simulateShake();
        });

        omikujiBox.addEventListener('click', () => {
            if (shakeCount < requiredShakes) simulateShake();
        });

        resetBtn.addEventListener('click', () => {
            if (confirm('履歴をリセットしますか？')) {
                localStorage.removeItem(STORAGE_KEY);
                renderHistory();
                resetOmikuji();
            }
        });

        function simulateShake() {
            shakeCount++;
            
            // 1回目の振る動作で箱を逆さまにする
            if (shakeCount === 1) {
                omikujiWrapper.classList.add('inverted');
            }

            const remaining = requiredShakes - shakeCount;
            shakeInstruction.textContent = remaining > 0 
                ? `micro:bitを3回振ってね（あと${remaining}回）` 
                : 'シャッフル完了！';
            
            omikujiBox.classList.add('shaking');
            setTimeout(() => {
                omikujiBox.classList.remove('shaking');
                if (shakeCount === requiredShakes) {
                    showResult();
                }
            }, 500);
        }

        function showResult() {
            // 結果が出たら元の向きに戻す
            omikujiWrapper.classList.remove('inverted');

            fortuneResultsList.innerHTML = '';
            const results = [];
            fortuneCategories.forEach(cat => {
                const stars = Math.floor(Math.random() * 5) + 1;
                const message = cat.messages[Math.floor(Math.random() * cat.messages.length)];
                results.push({ name: cat.name, stars: stars, message: message });
            });

            const bestLuck = [...results].sort((a, b) => b.stars - a.stars)[0];

            results.forEach(res => {
                const item = document.createElement('div');
                item.className = 'fortune-item';
                item.innerHTML = `
                    <div class="fortune-header">
                        <span class="fortune-name">${res.name}</span>
                        <span class="stars">${'★'.repeat(res.stars)}${'☆'.repeat(5 - res.stars)}</span>
                    </div>
                    <div class="fortune-message">${res.message}</div>
                `;
                fortuneResultsList.appendChild(item);
            });

            strongLuckTitle.textContent = `${bestLuck.name} (星${bestLuck.stars})`;
            strongLuckCard.style.display = 'block';
            fortuneResultsList.style.display = 'flex';
            shakeInstruction.textContent = '今日のおみくじ完了！';

            addHistory(bestLuck.name, bestLuck.stars);
        }

        function addHistory(luckName, stars) {
            const now = new Date();
            const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            const historyData = { time: timeStr, name: luckName, stars: stars };
            const currentHistory = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            currentHistory.unshift(historyData);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(currentHistory));
            renderHistory();
        }

        function renderHistory() {
            const currentHistory = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            if (currentHistory.length === 0) {
                historyList.innerHTML = '<li class="history-item"><span>履歴はまだありません</span></li>';
                return;
            }
            historyList.innerHTML = currentHistory.map(item => `
                <li class="history-item">
                    <span>${item.time} - ${item.name}</span>
                    <span>星${item.stars}つ！</span>
                </li>
            `).join('');
        }

        function resetOmikuji() {
            shakeCount = 0;
            omikujiWrapper.classList.remove('inverted');
            shakeInstruction.textContent = `micro:bitを3回振ってね（あと${requiredShakes}回）`;
            fortuneResultsList.style.display = 'none';
            strongLuckCard.style.display = 'none';
        }
    </script>
</body>
</html>
