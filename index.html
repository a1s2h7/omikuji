<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生おみくじ</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --main-blue: #64b5f6;
            --accent-orange: #ff8a65;
            --text-color: #37474f;
            --card-bg: #ffffff;
            --shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            --border-radius: 16px;
            --star-color: #ffb300;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            color: var(--main-blue);
            font-size: 1.8rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            background-color: #eee;
            margin-top: 8px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-connect {
            background-color: var(--main-blue);
            color: white;
        }

        .btn-shake {
            background-color: var(--accent-orange);
            color: white;
        }

        .btn-history {
            background-color: #90a4ae;
            color: white;
        }

        .btn-reset {
            background-color: #cfd8dc;
            color: var(--text-color);
        }

        .shake-counter {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-orange);
            margin-top: 5px;
        }

        /* 3Dおみくじ箱のエリア */
        .omikuji-box-area {
            perspective: 1200px;
            height: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            margin: 10px 0;
        }

        /* 箱の回転（上下）を制御するラッパー */
        .hex-box-wrapper {
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotateX(-10deg) rotateY(20deg) rotateZ(0deg);
        }

        /* 逆さま状態（画面内で180度回転） */
        .hex-box-wrapper.inverted {
            transform: rotateX(-10deg) rotateY(20deg) rotateZ(180deg);
        }

        .hex-box {
            position: relative;
            width: 120px;
            height: 300px;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            width: 120px;
            height: 300px;
            background: linear-gradient(to right, #fdf5e6, #f5deb3, #fdf5e6);
            border: 1px solid #d2b48c;
            display: flex;
            justify-content: center;
            align-items: center;
            backface-visibility: visible;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.08);
        }

        /* 各面の設定（60度ずつ回転、translateZを104pxに拡大） */
        .face:nth-child(1) { transform: rotateY(0deg) translateZ(104px); }
        .face:nth-child(2) { transform: rotateY(60deg) translateZ(104px); }
        .face:nth-child(3) { transform: rotateY(120deg) translateZ(104px); }
        .face:nth-child(4) { transform: rotateY(180deg) translateZ(104px); }
        .face:nth-child(5) { transform: rotateY(240deg) translateZ(104px); }
        .face:nth-child(6) { transform: rotateY(300deg) translateZ(104px); }

        .face::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 4px,
                rgba(0,0,0,0.03) 4px,
                rgba(0,0,0,0.03) 8px
            );
            pointer-events: none;
        }

        .face.front::after {
            content: "学生みくじ";
            writing-mode: vertical-rl;
            color: #8b7d6b;
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 10px;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
        }

        .cap {
            position: absolute;
            width: 208px;
            height: 208px;
            background: #fff9e6;
            left: -44px;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            border: 1px solid #f0e68c;
        }
        .cap.top { top: -20px; transform: rotateX(90deg) translateZ(20px); }

        /* アニメーション */
        .shaking .hex-box {
            animation: shake3d 0.5s infinite linear;
        }

        @keyframes shake3d {
            0% { transform: rotateX(0deg); }
            25% { transform: rotateX(10deg) rotateY(10deg) translateZ(10px) rotateZ(5deg); }
            50% { transform: rotateX(-20deg) rotateY(-10deg) translateZ(-5px) rotateZ(-5deg); }
            75% { transform: rotateX(15deg) rotateY(5deg) translateZ(15px) rotateZ(3deg); }
            100% { transform: rotateX(0deg); }
        }

        .fortune-results-list {
            display: none;
            text-align: left;
            margin-top: 20px;
            gap: 10px;
            flex-direction: column;
        }

        .fortune-item {
            background: #fffafa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #f0f0f0;
        }

        .fortune-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .fortune-name {
            font-weight: bold;
            color: var(--text-color);
        }

        .stars {
            color: var(--star-color);
            letter-spacing: 2px;
        }

        .fortune-message {
            font-size: 0.85rem;
            color: #666;
        }

        .strong-luck-card {
            display: none;
            background-color: #fff9f0;
            border: 2px solid var(--accent-orange);
            padding: 15px;
            border-radius: var(--border-radius);
            text-align: center;
            margin-top: 10px;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .strong-luck-label {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--accent-orange);
            display: block;
            margin-bottom: 5px;
        }

        .strong-luck-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--text-color);
        }

        /* 履歴モーダル（オーバーレイ） */
        .history-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .history-modal {
            background: white;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            border-radius: var(--border-radius);
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: modalSlideUp 0.3s ease;
        }

        @keyframes modalSlideUp {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }

        .history-title {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .history-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .history-item {
            padding: 12px 0;
            border-bottom: 1px dashed #ddd;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        .history-empty {
            color: #999;
            text-align: center;
            padding: 40px 0;
        }

        .btn-close {
            background: #eee;
            color: #666;
            width: 100%;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .card { padding: 15px; }
            .omikuji-box-area { height: 320px; }
            .hex-box { width: 90px; height: 220px; }
            .face { width: 90px; height: 220px; }
            .face:nth-child(1) { transform: rotateY(0deg) translateZ(78px); }
            .face:nth-child(2) { transform: rotateY(60deg) translateZ(78px); }
            .face:nth-child(3) { transform: rotateY(120deg) translateZ(78px); }
            .face:nth-child(4) { transform: rotateY(180deg) translateZ(78px); }
            .face:nth-child(5) { transform: rotateY(240deg) translateZ(78px); }
            .face:nth-child(6) { transform: rotateY(300deg) translateZ(78px); }
            .cap { width: 156px; height: 156px; left: -33px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>学生おみくじ</h1>
            <div id="connectionStatus" class="status-badge">micro:bit未接続</div>
        </header>

        <section class="card controls">
            <button id="connectBtn" class="btn-connect">micro:bitを接続</button>
            <button id="shakeBtn" class="btn-shake">1回振る（テスト用）</button>
            <button id="viewHistoryBtn" class="btn-history">強運ログを見る</button>
            <div id="shakeInstruction" class="shake-counter">
                micro:bitを3回振ってね（あと3回）
            </div>
        </section>

        <section class="card">
            <div id="omikujiBox" class="omikuji-box-area">
                <div id="omikujiWrapper" class="hex-box-wrapper">
                    <div class="hex-box">
                        <div class="face front"></div>
                        <div class="face"></div>
                        <div class="face"></div>
                        <div class="face"></div>
                        <div class="face"></div>
                        <div class="face"></div>
                        <div class="cap top"></div>
                    </div>
                </div>
            </div>
            
            <div id="strongLuckCard" class="strong-luck-card">
                <span class="strong-luck-label">✨ 今日の強運 ✨</span>
                <div id="strongLuckTitle" class="strong-luck-title">---</div>
            </div>

            <div id="fortuneResultsList" class="fortune-results-list"></div>
        </section>
    </div>

    <!-- 履歴表示用オーバーレイ -->
    <div id="historyOverlay" class="history-overlay">
        <div class="history-modal">
            <div class="history-header">
                <span class="history-title">強運ログ（履歴）</span>
            </div>
            <ul id="historyList" class="history-list">
                <!-- ここに履歴が入ります -->
            </ul>
            <div style="display: flex; gap: 10px;">
                <button id="resetBtn" class="btn-reset">履歴をリセット</button>
                <button id="closeHistoryBtn" class="btn-close">とじる</button>
            </div>
        </div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const shakeBtn = document.getElementById('shakeBtn');
        const viewHistoryBtn = document.getElementById('viewHistoryBtn');
        const closeHistoryBtn = document.getElementById('closeHistoryBtn');
        const resetBtn = document.getElementById('resetBtn');
        const historyOverlay = document.getElementById('historyOverlay');
        const shakeInstruction = document.getElementById('shakeInstruction');
        const omikujiBox = document.getElementById('omikujiBox');
        const omikujiWrapper = document.getElementById('omikujiWrapper');
        const fortuneResultsList = document.getElementById('fortuneResultsList');
        const strongLuckCard = document.getElementById('strongLuckCard');
        const strongLuckTitle = document.getElementById('strongLuckTitle');
        const historyList = document.getElementById('historyList');
        const connectionStatus = document.getElementById('connectionStatus');

        let shakeCount = 0;
        const requiredShakes = 3;
        const STORAGE_KEY = 'omikuji_history';
        let port;
        let reader;

        // 運勢のデータ
        const fortuneCategories = [
            { name: '課題運', messages: ['すぐに終わるよ！', '難問に挑戦してみよう', '提出忘れに注意！', '集中力が続く日', 'スラスラ解ける'] },
            { name: '出席運', messages: ['皆勤賞ペース！', '友達と楽しく話せる', '遅刻に注意しよう', '良い席になれるかも', '先生に褒められるかも'] },
            { name: '金運', messages: ['無駄遣いなし！', 'お小遣いゲットの予感', '計画的に使おう', '欲しかったものが買える？', '落とし物に注意'] },
            { name: '睡眠運', messages: ['快眠！目覚めスッキリ', '二度寝が最高に気持ちいい', '面白い夢が見られそう', '早めに寝るのが吉', '夢の中で勉強しちゃう？'] },
            { name: '昼食運', messages: ['大好物が出るよ！', '新メニューに挑戦しよう', '完食して元気いっぱい', '友達とお弁当交換？', 'デザートがあるかも'] }
        ];

        // ページ読み込み時に履歴を準備
        window.addEventListener('DOMContentLoaded', () => {
            updateHistoryUI();
        });

        // 履歴を表示する
        viewHistoryBtn.addEventListener('click', () => {
            updateHistoryUI();
            historyOverlay.style.display = 'flex';
        });

        // 履歴を閉じる
        closeHistoryBtn.addEventListener('click', () => {
            historyOverlay.style.display = 'none';
        });

        // 履歴をリセット
        resetBtn.addEventListener('click', () => {
            if (confirm('履歴をリセットしますか？')) {
                localStorage.removeItem(STORAGE_KEY);
                updateHistoryUI();
                resetOmikuji();
            }
        });

        // micro:bit接続
        connectBtn.addEventListener('click', async () => {
            if (!("serial" in navigator)) {
                alert("お使いのブラウザは Web Serial API をサポートしていません。");
                return;
            }
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                connectionStatus.textContent = 'micro:bit 接続済み';
                connectionStatus.style.backgroundColor = '#d4edda';
                readLoop();
            } catch (error) {
                console.error(error);
            }
        });

        async function readLoop() {
            const textDecoder = new TextDecoderStream();
            const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();
            let buffer = '';
            try {
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += value;
                    let lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (let line of lines) {
                        line = line.trim();
                        if (line.includes('S') || line.includes('s')) simulateShake();
                    }
                }
            } catch (error) {
                console.error(error);
            } finally {
                reader.releaseLock();
            }
        }

        shakeBtn.addEventListener('click', () => {
            if (shakeCount < requiredShakes) simulateShake();
        });

        omikujiBox.addEventListener('click', () => {
            if (shakeCount < requiredShakes) simulateShake();
        });

        function simulateShake() {
            shakeCount++;
            const remaining = requiredShakes - shakeCount;
            shakeInstruction.textContent = remaining > 0 
                ? `micro:bitを3回振ってね（あと${remaining}回）` 
                : 'シャッフル完了！';

            if (shakeCount === 1) {
                omikujiWrapper.classList.add('inverted');
                setTimeout(() => { performShakeAction(); }, 600);
            } else {
                performShakeAction();
            }
        }

        function performShakeAction() {
            omikujiBox.classList.add('shaking');
            setTimeout(() => {
                omikujiBox.classList.remove('shaking');
                if (shakeCount === requiredShakes) {
                    showResult();
                }
            }, 500);
        }

        function showResult() {
            omikujiWrapper.classList.remove('inverted');
            fortuneResultsList.innerHTML = '';
            const results = [];
            fortuneCategories.forEach(cat => {
                const stars = Math.floor(Math.random() * 5) + 1;
                const message = cat.messages[Math.floor(Math.random() * cat.messages.length)];
                results.push({ name: cat.name, stars: stars, message: message });
            });

            const bestLuck = [...results].sort((a, b) => b.stars - a.stars)[0];

            results.forEach(res => {
                const item = document.createElement('div');
                item.className = 'fortune-item';
                item.innerHTML = `
                    <div class="fortune-header">
                        <span class="fortune-name">${res.name}</span>
                        <span class="stars">${'★'.repeat(res.stars)}${'☆'.repeat(5 - res.stars)}</span>
                    </div>
                    <div class="fortune-message">${res.message}</div>
                `;
                fortuneResultsList.appendChild(item);
            });

            strongLuckTitle.textContent = `${bestLuck.name} (星${bestLuck.stars})`;
            strongLuckCard.style.display = 'block';
            fortuneResultsList.style.display = 'flex';
            shakeInstruction.textContent = '今日のおみくじ完了！';

            // 画面の一番下まで自動スクロール
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 300);

            addHistory(bestLuck.name, bestLuck.stars, bestLuck.message);
        }

        function addHistory(luckName, stars, message) {
            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            const historyData = { time: timeStr, name: luckName, stars: stars, message: message };
            const currentHistory = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            currentHistory.unshift(historyData);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(currentHistory));
        }

        function updateHistoryUI() {
            const currentHistory = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            if (currentHistory.length === 0) {
                historyList.innerHTML = '<li class="history-empty">履歴がここに出ます</li>';
                return;
            }
            historyList.innerHTML = currentHistory.map(item => `
                <li class="history-item" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                    <div style="width: 100%; display: flex; justify-content: space-between; font-weight: bold;">
                        <span>${item.time} - ${item.name}</span>
                        <span>星${item.stars}つ！</span>
                    </div>
                    <div style="font-size: 0.8rem; color: #666;">${item.message || ''}</div>
                </li>
            `).join('');
        }

        function resetOmikuji() {
            shakeCount = 0;
            omikujiWrapper.classList.remove('inverted');
            shakeInstruction.textContent = `micro:bitを3回振ってね（あと${requiredShakes}回）`;
            fortuneResultsList.style.display = 'none';
            strongLuckCard.style.display = 'none';
        }
    </script>
</body>
</html>
